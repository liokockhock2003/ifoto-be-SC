# Shared defaults — keep minimal

spring.application.name=ifoto-backend
server.port=${PORT:8080}

# Default profile (overridden by -Dspring-boot.run.profiles=dev|test|prod at runtime)
spring.profiles.active=dev

# Force Flyway to manage schema — Hibernate must NOT touch it
spring.jpa.hibernate.ddl-auto=none

# Flyway (will be enabled in all profiles)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Mail (used by password reset)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# App-level email metadata
app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:no-reply@ifoto.local}}
app.mail.app-name=${APP_MAIL_APP_NAME:iFoto}

# Password reset
app.password-reset.token-expiration-ms=${APP_PASSWORD_RESET_TOKEN_EXPIRATION_MS:900000}
app.password-reset.reset-url-base=${APP_PASSWORD_RESET_URL_BASE:http://localhost:5173/reset-password}

# Email verification (24 h default)
app.email-verification.token-expiration-ms=${EMAIL_VERIFY_TOKEN_EXPIRY_MS:86400000}
app.email-verification.verify-url-base=${EMAIL_VERIFY_URL_BASE:http://localhost:5173/verify-email}