# ────────────────────────────────────────────────
# DEVELOPMENT – local machine, maximum debug info
# ────────────────────────────────────────────────

# Database – local MySQL (docker or local install)
spring.datasource.url=${DEV_DB_URL}
spring.datasource.username=${DEV_DB_USER}
spring.datasource.password=${DEV_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Helpful for development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

app.welcome.message=Hello from DEV environment!

# Cookie-based auth CORS (dev)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# Flyway out-of-order and ignore patterns for development flexibility
# spring.flyway.out-of-order=true
# spring.flyway.ignore-migration-patterns=true
