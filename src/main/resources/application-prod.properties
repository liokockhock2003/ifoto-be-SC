# ────────────────────────────────────────────────
# PRODUCTION – secure, minimal logging, real config
# ────────────────────────────────────────────────

# Production database (Railway or similar)
spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No SQL in production logs
spring.jpa.show-sql=false

app.welcome.message=Hello from PRODUCTION environment!

# Cookie-based auth CORS (prod) - keep explicit trusted domains only
app.cors.allowed-origins=https://ifoto-frontend.vercel.app/

# Disable API docs in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false