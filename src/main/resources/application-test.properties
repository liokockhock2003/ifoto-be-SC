# ────────────────────────────────────────────────
# TEST / STAGING / PREVIEW – closer to production
# ────────────────────────────────────────────────

# Usually a separate test database (Railway preview env or another schema)
spring.datasource.url=${TEST_DB_URL}
spring.datasource.username=${TEST_DB_USER}
spring.datasource.password=${TEST_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Moderate logging
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=INFO

# More production-like security
# spring.security.csrf.enabled=true   (uncomment when ready)

app.welcome.message=Hello from TEST environment!

# Cookie-based auth CORS (test/staging)
app.cors.allowed-origins=https://staging-ifoto-frontend.vercel.app