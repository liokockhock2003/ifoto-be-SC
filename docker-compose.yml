# docker-compose.yml (place in project root)

version: '3.9'
services:
  mysql:
    image: mysql:8.0
    env_file:
      - .env  # load DB vars from .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # from .env
      MYSQL_DATABASE: ifotodb_test                 # from .env
      MYSQL_USER: ${TEST_DB_USER}                    # from .env
      MYSQL_PASSWORD: ${TEST_DB_PASS}            # from .env
    ports:
      - "3307:3306"  # access from host (e.g. Workbench)
    volumes:
      - mysql-data:/var/lib/mysql  # persistent data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"  # access backend from host
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ifotodb_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kuala_Lumpur  # internal container name
      SPRING_DATASOURCE_USERNAME: ${TEST_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${TEST_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
  
  frontend:
    build: ../ifoto-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend 


volumes:
  mysql-data: